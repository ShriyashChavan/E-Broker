{% extends "base.html" %}

{% block title %}Login - E BROKERR{% endblock %}

{% block extra_styles %}
<style>
body {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
}
.card {
    border: none;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
}
.card-header {
    background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
    border-bottom: none;
}
</style>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg">
            <div class="card-header text-center">
                <i class="fas fa-sign-in-alt fa-2x text-primary mb-2"></i>
                <h3 class="mb-0">Login to E BROKERR</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="user_type" class="form-label">
                            <i class="fas fa-user-tag"></i> User Type
                        </label>
                        <select class="form-select" id="user_type" name="user_type" required>
                            <option value="">Select User Type</option>
                            <option value="tenant">🏠 Tenant</option>
                            <option value="landlord">🏢 Landlord</option>
                            <option value="admin">⚙️ Admin</option>
                        </select>
                        <small class="text-muted">Use <strong>admin@ebrokerr.com</strong> for admin login.</small>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope"></i> Email Address
                        </label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center bg-light">
                <p class="mb-0">Don't have an account?
                    <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold">
                        <i class="fas fa-user-plus"></i> Register here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
